# =============================================================================
# Emergency Edge/Fog Communication System — Docker Compose
# Full orchestration of all services, infrastructure, and monitoring
# =============================================================================

services:
  # ===========================================================================
  # Infrastructure Services
  # ===========================================================================

  postgres:
    image: postgres:16-alpine
    container_name: emergency-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: emergency-redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.1
    container_name: emergency-redpanda
    command:
      - redpanda start
      - --smp 1
      - --memory 256M
      - --reserve-memory 0M
      - --overprovisioned
      - --default-log-level=warn
      - --kafka-addr PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:9092
      - --node-id 0
      - --set redpanda.auto_create_topics_enabled=true
    ports:
      - "19092:9092"    # Kafka
      - "9644:9644"     # Admin API / metrics
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health --api-urls http://localhost:9644 | grep -q 'Healthy:.*true' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 10s
    networks:
      - backend
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M

  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:latest
    container_name: emergency-redpanda-console
    environment:
      KAFKA_BROKERS: redpanda:9092
      REDPANDA_ADMINAPI_URLS: http://redpanda:9644
    ports:
      - "8080:8080"
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - backend

  kafka-setup:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.1
    container_name: emergency-kafka-setup
    entrypoint: /bin/bash
    command: /scripts/create-topics.sh
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
    volumes:
      - ./infra/kafka/create-topics.sh:/scripts/create-topics.sh
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - backend

  # ===========================================================================
  # Application Services
  # ===========================================================================

  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile
    container_name: emergency-gateway
    ports:
      - "${GATEWAY_PORT:-8000}:8000"
    environment:
      - SERVICE_NAME=gateway
      - AUTH_SERVICE_URL=http://auth:8001
      - MESSAGING_SERVICE_URL=http://messaging:8002
      - EVENTS_SERVICE_URL=http://events:8003
      - PREDICTION_SERVICE_URL=http://prediction:8004
      - DSL_SERVICE_URL=http://dsl-engine:8005
      - PROJECT_SERVICE_URL=http://project-management:8006
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM}
    depends_on:
      redis:
        condition: service_healthy
      auth:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - backend
      - frontend

  auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
    container_name: emergency-auth
    ports:
      - "${AUTH_PORT:-8001}:8001"
    environment:
      - SERVICE_NAME=auth
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/emergency_auth
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM}
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES}
      - JWT_REFRESH_TOKEN_EXPIRE_DAYS=${JWT_REFRESH_TOKEN_EXPIRE_DAYS}
      - RSA_KEY_SIZE=${RSA_KEY_SIZE}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend

  messaging:
    build:
      context: .
      dockerfile: services/messaging/Dockerfile
    container_name: emergency-messaging
    ports:
      - "${MESSAGING_PORT:-8002}:8002"
    environment:
      - SERVICE_NAME=messaging
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/emergency_messaging
      - REDIS_URL=${REDIS_URL}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    networks:
      - backend

  events:
    build:
      context: .
      dockerfile: services/events/Dockerfile
    container_name: emergency-events
    ports:
      - "${EVENTS_PORT:-8003}:8003"
    environment:
      - SERVICE_NAME=events
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/emergency_events
      - REDIS_URL=${REDIS_URL}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    networks:
      - backend

  prediction:
    build:
      context: .
      dockerfile: services/prediction/Dockerfile
    container_name: emergency-prediction
    ports:
      - "${PREDICTION_PORT:-8004}:8004"
    environment:
      - SERVICE_NAME=prediction
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/emergency_prediction
      - REDIS_URL=${REDIS_URL}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    networks:
      - backend

  dsl-engine:
    build:
      context: .
      dockerfile: services/dsl_engine/Dockerfile
    container_name: emergency-dsl-engine
    ports:
      - "${DSL_PORT:-8005}:8005"
    environment:
      - SERVICE_NAME=dsl_engine
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/emergency_dsl
      - REDIS_URL=${REDIS_URL}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    networks:
      - backend

  project-management:
    build:
      context: .
      dockerfile: services/project_management/Dockerfile
    container_name: emergency-project-mgmt
    ports:
      - "${PROJECT_MGMT_PORT:-8006}:8006"
    environment:
      - SERVICE_NAME=project_management
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/emergency_project
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend

  # ===========================================================================
  # Edge Nodes (Simulated)
  # ===========================================================================

  edge-node-1:
    build:
      context: .
      dockerfile: services/edge/Dockerfile
    container_name: emergency-edge-1
    ports:
      - "8010:8010"
    environment:
      - SERVICE_NAME=edge-node-1
      - NODE_ID=edge-1
      - ZONE=${EDGE_NODE_1_ZONE:-zone-alpha}
      - SENSORS=${EDGE_NODE_1_SENSORS:-temperature,smoke,motion}
      - REDIS_URL=${REDIS_URL}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - FOG_NODE_URL=http://fog-node-1:8020
      - SIMULATION_INTERVAL=5
    depends_on:
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    networks:
      - backend

  edge-node-2:
    build:
      context: .
      dockerfile: services/edge/Dockerfile
    container_name: emergency-edge-2
    ports:
      - "8011:8010"
    environment:
      - SERVICE_NAME=edge-node-2
      - NODE_ID=edge-2
      - ZONE=${EDGE_NODE_2_ZONE:-zone-beta}
      - SENSORS=${EDGE_NODE_2_SENSORS:-temperature,network,access}
      - REDIS_URL=${REDIS_URL}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - FOG_NODE_URL=http://fog-node-1:8020
      - SIMULATION_INTERVAL=5
    depends_on:
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    networks:
      - backend

  # ===========================================================================
  # Fog Nodes (Simulated)
  # ===========================================================================

  fog-node-1:
    build:
      context: .
      dockerfile: services/fog/Dockerfile
    container_name: emergency-fog-1
    ports:
      - "8020:8020"
    environment:
      - SERVICE_NAME=fog-node-1
      - NODE_ID=fog-1
      - NODE_ROLE=${FOG_NODE_1_ROLE:-primary}
      - REDIS_URL=${REDIS_URL}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - MESSAGING_SERVICE_URL=http://messaging:8002
      - DSL_SERVICE_URL=http://dsl-engine:8005
      - PREDICTION_SERVICE_URL=http://prediction:8004
    depends_on:
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    networks:
      - backend

  fog-node-2:
    build:
      context: .
      dockerfile: services/fog/Dockerfile
    container_name: emergency-fog-2
    ports:
      - "8021:8020"
    environment:
      - SERVICE_NAME=fog-node-2
      - NODE_ID=fog-2
      - NODE_ROLE=${FOG_NODE_2_ROLE:-backup}
      - REDIS_URL=${REDIS_URL}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS}
      - MESSAGING_SERVICE_URL=http://messaging:8002
      - DSL_SERVICE_URL=http://dsl-engine:8005
      - PREDICTION_SERVICE_URL=http://prediction:8004
    depends_on:
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    networks:
      - backend

  # ===========================================================================
  # Dashboard
  # ===========================================================================

  dashboard:
    build:
      context: .
      dockerfile: services/dashboard/Dockerfile
    container_name: emergency-dashboard
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:${GATEWAY_PORT:-8000}
      - NEXT_PUBLIC_WS_URL=ws://localhost:${MESSAGING_PORT:-8002}
    depends_on:
      - gateway
    networks:
      - frontend

  # ===========================================================================
  # Monitoring
  # ===========================================================================

  prometheus:
    image: prom/prometheus:latest
    container_name: emergency-prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infra/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    networks:
      - backend
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: emergency-grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - monitoring

# =============================================================================
# Networks
# =============================================================================
networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge
  monitoring:
    driver: bridge

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
  redis_data:
  redpanda_data:
  prometheus_data:
  grafana_data:
