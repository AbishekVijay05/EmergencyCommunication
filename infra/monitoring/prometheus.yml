# =============================================================================
# Prometheus Configuration — Emergency Edge/Fog Communication System
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: "gateway"
    static_configs:
      - targets: ["gateway:8000"]
    metrics_path: /metrics

  - job_name: "auth-service"
    static_configs:
      - targets: ["auth:8001"]
    metrics_path: /metrics

  - job_name: "messaging-service"
    static_configs:
      - targets: ["messaging:8002"]
    metrics_path: /metrics

  - job_name: "events-service"
    static_configs:
      - targets: ["events:8003"]
    metrics_path: /metrics

  - job_name: "prediction-service"
    static_configs:
      - targets: ["prediction:8004"]
    metrics_path: /metrics

  - job_name: "dsl-engine"
    static_configs:
      - targets: ["dsl-engine:8005"]
    metrics_path: /metrics

  - job_name: "project-management"
    static_configs:
      - targets: ["project-management:8006"]
    metrics_path: /metrics

  - job_name: "edge-node-1"
    static_configs:
      - targets: ["edge-node-1:8010"]
    metrics_path: /metrics

  - job_name: "edge-node-2"
    static_configs:
      - targets: ["edge-node-2:8010"]
    metrics_path: /metrics

  - job_name: "fog-node-1"
    static_configs:
      - targets: ["fog-node-1:8020"]
    metrics_path: /metrics

  - job_name: "fog-node-2"
    static_configs:
      - targets: ["fog-node-2:8020"]
    metrics_path: /metrics

  - job_name: "redpanda"
    static_configs:
      - targets: ["redpanda:9644"]
    metrics_path: /public_metrics


